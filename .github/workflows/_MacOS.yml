name: _macOS (PyInstaller universal2 app)

on:
  workflow_call:
    secrets:
      APPLE_ID:
        required: false
      APPLE_TEAM_ID:
        required: false
      APPLE_DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD:
        required: false
      APPLE_DEVELOPER_ID_APPLICATION_CERTIFICATE_BASE64:
        required: false
      APPLE_KEYCHAIN_PASSWORD:
        required: false
      APPLE_APPLICATION_SPECIFIC_PASSWORD:
        required: false

jobs:
  macos_arm64_app:
    runs-on: macos-latest
    env:
      MACOSX_DEPLOYMENT_TARGET: "11"
      CFLAGS: "-mmacosx-version-min=11"
      LDFLAGS: "-mmacosx-version-min=11"
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Download wheel artifact
        uses: actions/download-artifact@v6
        with:
          name: wheels
          path: wheels

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt
          pip install pyinstaller
          pip install wheels/*.whl

      - name: Build arm64 app
        run: python bundle/macos_bundle.py --dist-dir bundle/MacOS/arm64 --work-dir bundle/build/MacOS/arm64

      - name: Normalize arm64 app location
        run: |
          set -euo pipefail
          APP_PATH="$(find bundle/MacOS/arm64 -type d -name 'SYNCmoss.app' | head -n 1)"
          if [ -z "$APP_PATH" ]; then
            echo "SYNCmoss.app not found in arm64 build output"
            find bundle/MacOS/arm64 -maxdepth 5 -print
            exit 1
          fi
          mkdir -p bundle/MacOS/arm64/artifact
          rm -rf bundle/MacOS/arm64/artifact/SYNCmoss.app
          cp -R "$APP_PATH" bundle/MacOS/arm64/artifact/SYNCmoss.app

      - name: Upload arm64 app artifact
        uses: actions/upload-artifact@v5
        with:
          name: macos-arm64-app
          path: bundle/MacOS/arm64/artifact/SYNCmoss.app
          if-no-files-found: error
          retention-days: 5

  macos_x86_64_app:
    runs-on: macos-latest
    env:
      MACOSX_DEPLOYMENT_TARGET: "11"
      CFLAGS: "-mmacosx-version-min=11"
      LDFLAGS: "-mmacosx-version-min=11"
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install Rosetta
        run: sudo softwareupdate --install-rosetta --agree-to-license

      - name: Create x86_64 Python environment
        run: |
          python -m venv venv-x86_64
          lipo venv-x86_64/bin/python -remove arm64 -output venv-x86_64/bin/python_x86
          mv venv-x86_64/bin/python_x86 venv-x86_64/bin/python
          chmod +x venv-x86_64/bin/python
          file venv-x86_64/bin/python

      - name: Download wheel artifact
        uses: actions/download-artifact@v6
        with:
          name: wheels
          path: wheels

      - name: Install dependencies (x86_64)
        run: |
          source venv-x86_64/bin/activate
          arch -x86_64 python -m pip install --upgrade pip setuptools wheel
          arch -x86_64 pip install numba==0.62.1
          arch -x86_64 pip install -r requirements.txt
          arch -x86_64 pip install pyinstaller
          arch -x86_64 pip install wheels/*.whl

      - name: Build x86_64 app
        run: |
          source venv-x86_64/bin/activate
          arch -x86_64 python bundle/macos_bundle.py --dist-dir bundle/MacOS/x86_64 --work-dir bundle/build/MacOS/x86_64

      - name: Normalize x86_64 app location
        run: |
          set -euo pipefail
          APP_PATH="$(find bundle/MacOS/x86_64 -type d -name 'SYNCmoss.app' | head -n 1)"
          if [ -z "$APP_PATH" ]; then
            echo "SYNCmoss.app not found in x86_64 build output"
            find bundle/MacOS/x86_64 -maxdepth 5 -print
            exit 1
          fi
          mkdir -p bundle/MacOS/x86_64/artifact
          rm -rf bundle/MacOS/x86_64/artifact/SYNCmoss.app
          cp -R "$APP_PATH" bundle/MacOS/x86_64/artifact/SYNCmoss.app

      - name: Upload x86_64 app artifact
        uses: actions/upload-artifact@v5
        with:
          name: macos-x86_64-app
          path: bundle/MacOS/x86_64/artifact/SYNCmoss.app
          if-no-files-found: error
          retention-days: 5

  macos_universal2:
    runs-on: macos-latest
    needs:
      - macos_arm64_app
      - macos_x86_64_app
    env:
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      CERTIFICATE_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_CERTIFICATE_BASE64 }}
      CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD }}
      KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
      APPLICATION_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APPLICATION_SPECIFIC_PASSWORD }}
    steps:
      - uses: actions/checkout@v6

      - name: Download arm64 app
        uses: actions/download-artifact@v6
        with:
          name: macos-arm64-app
          path: dist/arm64

      - name: Download x86_64 app
        uses: actions/download-artifact@v6
        with:
          name: macos-x86_64-app
          path: dist/x86_64

      - name: Merge into universal2 app
        run: |
          set -euo pipefail
          ARM_APP="$(find dist/arm64 -type d -name 'SYNCmoss.app' | head -n 1)"
          X86_APP="$(find dist/x86_64 -type d -name 'SYNCmoss.app' | head -n 1)"

          # actions/download-artifact may sometimes restore the app without the
          # outer *.app directory, leaving Contents/ directly in target folder.
          if [ -z "$ARM_APP" ] && [ -d dist/arm64/Contents ]; then
            ARM_APP="dist/arm64"
          fi
          if [ -z "$X86_APP" ] && [ -d dist/x86_64/Contents ]; then
            X86_APP="dist/x86_64"
          fi

          if [ -z "$ARM_APP" ] || [ -z "$X86_APP" ]; then
            echo "Could not locate arm64/x86_64 apps after artifact download"
            find dist -maxdepth 6 -print
            exit 1
          fi

          mkdir -p dist/universal2
          if [ "$(basename "$ARM_APP")" = "SYNCmoss.app" ]; then
            cp -R "$ARM_APP" dist/universal2/
          else
            mkdir -p dist/universal2/SYNCmoss.app
            cp -R "$ARM_APP/Contents" dist/universal2/SYNCmoss.app/
          fi
          UNI_APP="dist/universal2/SYNCmoss.app"

          echo "Merging executables in Contents/MacOS..."
          for exe in "$ARM_APP/Contents/MacOS/"*; do
            if [ ! -f "$exe" ]; then
              continue
            fi
            exe_name=$(basename "$exe")
            x86_exe="$X86_APP/Contents/MacOS/$exe_name"
            out_exe="$UNI_APP/Contents/MacOS/$exe_name"

            if [ ! -f "$x86_exe" ]; then
              continue
            fi

            if file "$exe" | grep -q 'Mach-O'; then
              lipo -create "$exe" "$x86_exe" -output "$out_exe"
            fi
          done

          get_archs() {
            echo "$1" | grep -oE 'arm64|x86_64' | sort | tr '\n' ' ' || true
          }

          contains_all_archs() {
            local container=($1)
            local contained=($2)

            for arch in "${contained[@]}"; do
              local found=0
              for c in "${container[@]}"; do
                if [ "$arch" = "$c" ]; then
                  found=1
                  break
                fi
              done
              if [ $found -eq 0 ]; then
                return 1
              fi
            done
            return 0
          }

          echo "Merging Mach-O files in Frameworks and Resources..."
          for section in Frameworks Resources; do
            section_dir="$ARM_APP/Contents/$section"
            if [ ! -d "$section_dir" ]; then
              continue
            fi

            find "$section_dir" -type f | while read -r arm_file; do
              if ! file "$arm_file" | grep -q 'Mach-O'; then
                continue
              fi

              rel_path="${arm_file#$ARM_APP/}"
              x86_file="$X86_APP/$rel_path"
              out_file="$UNI_APP/$rel_path"

              if [ ! -f "$x86_file" ]; then
                continue
              fi

              arch_arm64=$(lipo -info "$arm_file" 2>&1 || true)
              arch_x86_64=$(lipo -info "$x86_file" 2>&1 || true)

              archs_arm64=$(get_archs "$arch_arm64")
              archs_x86_64=$(get_archs "$arch_x86_64")

              is_arm64_universal2=false
              is_x86_64_universal2=false

              if [[ "$archs_arm64" == *"arm64"* && "$archs_arm64" == *"x86_64"* ]]; then
                is_arm64_universal2=true
              fi

              if [[ "$archs_x86_64" == *"arm64"* && "$archs_x86_64" == *"x86_64"* ]]; then
                is_x86_64_universal2=true
              fi

              if [ "$is_arm64_universal2" = true ] && [ "$is_x86_64_universal2" = false ]; then
                cp "$arm_file" "$out_file"
              elif [ "$is_x86_64_universal2" = true ] && [ "$is_arm64_universal2" = false ]; then
                cp "$x86_file" "$out_file"
              else
                if contains_all_archs "$archs_arm64" "$archs_x86_64" && contains_all_archs "$archs_x86_64" "$archs_arm64"; then
                  if [ "$is_arm64_universal2" = false ]; then
                    cp "$x86_file" "$out_file"
                  fi
                else
                  lipo -create "$arm_file" "$x86_file" -output "$out_file"
                fi
              fi
            done
          done

          echo "Universal2 app built at $UNI_APP"

      - name: Run smoke test on universal2 app
        run: |
          xattr -cr dist/universal2/SYNCmoss.app
          chmod +x dist/universal2/SYNCmoss.app/Contents/MacOS/SYNCmoss
          dist/universal2/SYNCmoss.app/Contents/MacOS/SYNCmoss --test

      - name: Create unsigned universal2 DMG
        run: |
          hdiutil create -volname SYNCmoss -srcfolder dist/universal2/SYNCmoss.app -ov -format UDZO dist/SYNCmoss-macOS-universal2.dmg

      - name: Sign + notarize (optional)
        if: env.APPLE_ID != '' && env.APPLE_TEAM_ID != '' && env.CERTIFICATE_BASE64 != '' && env.CERTIFICATE_PASSWORD != '' && env.KEYCHAIN_PASSWORD != '' && env.APPLICATION_SPECIFIC_PASSWORD != ''
        run: |
          set -euo pipefail
          echo "$CERTIFICATE_BASE64" | base64 --decode > cert.p12

          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security import cert.p12 -k build.keychain -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" build.keychain

          IDENTITY=$(security find-identity -v -p codesigning build.keychain | head -n 1 | sed -E 's/.*"([^"]+)"/\1/')
          codesign --force --deep --options runtime --timestamp --sign "$IDENTITY" dist/universal2/SYNCmoss.app
          codesign --verify --deep --strict --verbose=2 dist/universal2/SYNCmoss.app

          hdiutil create -volname SYNCmoss -srcfolder dist/universal2/SYNCmoss.app -ov -format UDZO dist/SYNCmoss-macOS-universal2-signed.dmg
          xcrun notarytool submit dist/SYNCmoss-macOS-universal2-signed.dmg --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLICATION_SPECIFIC_PASSWORD" --wait
          xcrun stapler staple dist/SYNCmoss-macOS-universal2-signed.dmg

      - name: Upload universal2 macOS artifacts
        uses: actions/upload-artifact@v5
        with:
          name: macos-universal2
          path: |
            dist/SYNCmoss-macOS-universal2.dmg
            dist/SYNCmoss-macOS-universal2-signed.dmg
          if-no-files-found: ignore
          retention-days: 5
