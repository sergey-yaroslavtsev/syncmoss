name: _Windows (PyInstaller executable)

on:
  workflow_call:

jobs:
  windows_pyinstaller:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Download wheel artifact
        uses: actions/download-artifact@v6
        with:
          name: wheels
          path: wheels

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt
          pip install wheels/*.whl
          pip install pyinstaller

      - name: Build with PyInstaller
        run: python bundle/bundle.py

      # The pytest suite already ran on Windows in _Tests.yml (before this job);
      # here we only self-test the frozen executable via the bundled smoke driver.
      - name: Run smoke test on frozen executable
        run: bundle\Windows\SYNCmoss\SYNCmoss_console.exe --test

      - name: Upload Windows executable
        uses: actions/upload-artifact@v5
        with:
          name: windows-executable-pyinstaller
          path: bundle/Windows/SYNCmoss/**
          retention-days: 5
