name: _Tests (Linux / Windows / macOS)

on:
  workflow_call:
  workflow_dispatch:

# Runs the pytest suite against the *installed wheel* on all three OSes in
# parallel. Called after the wheels are built and before any bundling/freezing,
# so a test failure stops the (expensive) PyInstaller builds.
jobs:
  tests:
    name: tests (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install Qt/OpenGL runtime libraries (Linux head-less PySide6)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxkbcommon0 libdbus-1-3 libglib2.0-0

      - name: Download wheel artifact
        uses: actions/download-artifact@v6
        with:
          name: wheels
          path: wheels

      - name: Install syncmoss from the built wheel (as a library) + pytest
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install wheels/*.whl
          pip install pytest

      # Run from a clean directory so the source tree is NOT on sys.path and the
      # installed wheel is exercised (syncmoss is a namespace package). mktemp -d
      # works in Git-bash on Windows too, avoiding backslash-path pitfalls.
      - name: Run test-suite against the installed library
        shell: bash
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          workdir="$(mktemp -d)"
          cd "$workdir"
          python -c "import syncmoss.syncmoss_main as m; print('syncmoss from:', m.__file__)"
          python -m pytest "$GITHUB_WORKSPACE/tests" -q
